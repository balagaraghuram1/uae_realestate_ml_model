version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uae_realestate
      - REDIS_URL=redis://redis:6379/0
    depends_on: [db, redis]
    volumes: [".:/app"]

  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: uae_realestate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  worker:
    build: .
    command: celery -A src.tasks.celery_app worker -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]

volumes:
  pgdata:
