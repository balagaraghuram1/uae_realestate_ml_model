stages:
  data_collection:
    cmd: python src/data/collectors/collector_orchestrator.py --collect-all
    deps:
      - src/data/collectors
    outs:
      - data/raw/properties.parquet
      - data/raw/transactions.parquet

  data_processing:
    cmd: python src/data/processors/cleaning_pipeline.py
    deps:
      - src/data/processors
      - data/raw/properties.parquet
    outs:
      - data/processed/properties_clean.parquet

  feature_engineering:
    cmd: python src/data/processors/feature_engineering.py
    deps:
      - data/processed/properties_clean.parquet
      - src/data/processors/feature_engineering.py
    outs:
      - data/features/property_features.parquet

  model_training:
    cmd: python src/ml/training/pipeline_trainer.py --model price_predictor
    deps:
      - data/features/property_features.parquet
      - src/ml/models/price_predictor.py
    outs:
      - model_registry/price_predictor/model.pkl
    metrics:
      - model_registry/price_predictor/metrics.json
